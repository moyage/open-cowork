protocol:
  name: open-cowork
  version: 0.3.11
layout: lean
default_read_set:
  - .governance/AGENTS.md
  - .governance/agent-entry.md
  - .governance/current-state.md
  - .governance/state.yaml
active_round:
  round_id: v0311-dogfood-resume
  goal: Let this repository dogfood the v0.3.11 lean state files and make ocw resume work for lean-only projects without legacy current-change.yaml.
  phase: closeout
  scope:
    in:
      - src/governance/activation.py
      - tests/test_v0311_lean_state.py
      - .governance/state.yaml
      - .governance/evidence.yaml
      - .governance/ledger.yaml
      - .governance/rules.yaml
      - .governance/current-state.md
      - .agent-state/tasks/v0311-dogfood-resume/**
    out:
      - release tags, package publishing, remote pushes, or PR creation
      - restoring legacy .governance/index/** as the default model
      - unrelated business-code changes
  acceptance:
    summary: Lean-only resume passes, repository lean documents validate, v0.3.11 and full tests pass, and real Hermes review approves.
    done_definition: full-scope
  plan:
    summary: Finish the lean-only resume regression, dogfood lean governance files in this repository, record verification evidence, request independent review, then close out.
    steps:
      - Preserve the TDD regression for lean-only ocw resume.
      - Write compact lean state, evidence, ledger, and rules files for this repository.
      - Run validate_lean_documents, ocw resume, v0.3.11 tests, and full tests.
      - Record verify results and request real local Hermes review.
      - Close the round only after review approval.
    risks:
      - Legacy heavy governance files remain in history and docs; they must stay compatibility references, not default state.
      - Remote compact failures can interrupt long sessions, so evidence must remain file-backed.
    assumptions:
      - The existing execution contract records the human-approved scope for this continuation.
      - Hermes is available locally for independent review.
  verification_plan:
    commands:
      - python3 - <<'PY' ... validate_lean_documents('.') ...
      - PYTHONPATH=src python3 -m governance.cli --root . resume
      - PYTHONPATH=src python3 -m unittest discover -s tests -p 'test_v0311_*.py'
      - PYTHONPATH=src python3 -m unittest discover -s tests
    external_rules:
      - real-local-review-required
      - lean-default-read-set
      - compact-evidence-only
    reviewer_required: true
  participants:
    sponsor: human
    owner_agent: codex-agent
    orchestrator: codex-agent
    executor: codex-agent
    reviewer: Hermes
    advisors:
      []
  participant_initialization:
    status: complete
    required_roles:
      - sponsor
      - owner_agent
      - executor
      - reviewer
    initialized_roles:
      - sponsor
      - owner_agent
      - executor
      - reviewer
    missing_roles:
      []
    role_bindings:
      - role: owner_agent
        actor: codex-agent
        responsibility: Maintain the lean governance facts, scope, evidence, and closeout state for this round.
        authority_scope:
          - active_round scope.in
          - execution contract v0311-dogfood-resume
        output_responsibility:
          - implementation patch
          - verify-result.md
          - closeout.md
        independence_requirement: Cannot approve its own final review.
        evidence_ref: E-v0311-dogfood-contract
      - role: reviewer
        actor: Hermes
        responsibility: Independently review scope compliance, resume behavior, lean document validity, and verification evidence.
        authority_scope:
          - review decision only
        output_responsibility:
          - hermes-review.md
        independence_requirement: Must be a real local Agent invocation, not Codex simulation.
        evidence_ref: E-v0311-dogfood-review-pending
    bypass:
      allowed: false
      requested_by: ''
      approved_by: ''
      approval_source: ''
      approval_channel: ''
      approval_evidence_ref: ''
      approved_at: ''
      reason: ''
      impact_scope: ''
  gates:
    execution:
      status: approved
      requested_by: codex-agent
      approved_by: human
      approval_source: chat
      approval_channel: Codex App
      approval_evidence_ref: E-v0311-dogfood-contract
      created_by: codex-agent
      created_at: '2026-04-29T07:33:03Z'
      reason: User requested continuing v0.3.11 closeout and previous closeout named dogfood lean resume as next work.
    closeout:
      status: approved
      requested_by: codex-agent
      approved_by: Hermes
      approval_source: independent-review
      approval_channel: Hermes CLI
      approval_evidence_ref: E-v0311-dogfood-review
      created_by: codex-agent
      created_at: '2026-04-29T07:48:12Z'
      reason: Hermes approved closeout readiness for the dogfood resume round.
  external_rules:
    active:
      - real-local-review-required
      - scope-bound-execution
      - compact-evidence-only
    suspended:
      []
  evidence_refs:
    - E-v0311-dogfood-contract
    - E-v0311-dogfood-red
    - E-v0311-dogfood-green
    - E-v0311-dogfood-verify
    - E-v0311-dogfood-review
    - E-v0311-dogfood-closeout
    - E-V0311-RELEASE-CHECK-20260429
  verify:
    status: passed
    summary: validate_lean_documents, dogfood ocw resume, v0.3.11专项测试, and full 279-test suite passed.
    rule_results:
      - rule_id: scope-bound-execution
        status: passed
        evidence_ref: E-v0311-dogfood-verify
      - rule_id: compact-evidence-only
        status: passed
        evidence_ref: E-v0311-dogfood-verify
  review:
    status: completed
    decision: approve
    reviewer: Hermes
    independent: true
    summary: Real local Hermes reviewed this round and approved. See E-v0311-dogfood-review.
  implementation_commitment:
    mode: full-scope
    downgrade_allowed: false
    downgrade_approval: null
  closeout:
    status: completed
    summary: v0.3.11 release prep checks passed locally; publish/tag still requires human authorization.
    remaining_risks:
      - Future mixed lean/legacy migration states may need a sharper discriminator than the current lean-only check.
      - Release preparation remains a separate round.
    completed:
      - Execution contract exists.
      - Lean-only resume regression was added and made green in the previous session segment.
      - Repository lean state, evidence, ledger, and rules files validate.
      - Dogfood ocw resume returns continue-active-round for the active lean round.
      - v0.3.11专项测试 and full test suite passed.
      - Real local Hermes review approved.
    not_completed:
      []
    closed_by: codex-agent
    closed_at: '2026-04-29T08:38:33+00:00'
    evidence_ref: E-V0311-RELEASE-CHECK-20260429
  carry_forward:
    - After this round, decide whether to proceed into release preparation for v0.3.11.
